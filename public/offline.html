<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DoNext Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0f172a;
        color: #e2e8f0;
        font-family: Inter, system-ui, sans-serif;
      }

      main {
        max-width: 28rem;
        padding: 2rem;
        text-align: center;
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.75rem;
      }

      p {
        margin: 0;
        line-height: 1.6;
        color: #94a3b8;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>DoNext is offline</h1>
      <p>Your app shell is cached, but this view needs a connection. Reconnect and open DoNext again.</p>
    </main>
  </body>
</html>
